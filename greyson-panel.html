<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Greyson's Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#020617] text-white min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full p-8 rounded-[2.5rem] bg-slate-900 border border-white/10 shadow-2xl">
        <h1 class="text-3xl font-black mb-8 text-emerald-400 text-center">Send Reply</h1>
        
        <div class="space-y-5">
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-2">Target Username</label>
                <input id="targetUser" type="text" placeholder="GamerName123" class="w-full bg-black border border-white/10 p-4 rounded-2xl outline-none focus:border-blue-500">
            </div>
            
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-2">Message</label>
                <textarea id="replyMsg" placeholder="Yo! Added that site." class="w-full bg-black border border-white/10 p-4 rounded-2xl h-32 outline-none focus:border-blue-500 resize-none"></textarea>
            </div>
            
            <button onclick="send()" class="w-full bg-blue-600 py-4 rounded-2xl font-black hover:bg-blue-500 shadow-xl">POST NOTIFICATION</button>
            <a href="admin.html" class="block text-center text-slate-600 text-[10px] font-bold mt-4 uppercase">Lock Console</a>
        </div>
    </div>

    <script>
        const supabase = supabasejs.createClient('https://dkqxklxniugjpchpajlz.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrcXhrbHhuaXVnanBjaHBhamx6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNjY4MTIsImV4cCI6MjA4ODk0MjgxMn0.tBrAd0Im7XR30oNV1NROERm6-yF8PNBFeCqFFX4qbGM');

        async function send() {
            const user = document.getElementById('targetUser').value;
            const msg = document.getElementById('replyMsg').value;
            
            if(!user || !msg) return alert("Fill everything out!");

            const { error } = await supabase.from('site_notifications').insert([{ user_id: user, message: msg }]);

            if (error) alert("Error: " + error.message);
            else {
                alert("Sent!");
                document.getElementById('replyMsg').value = "";
            }
        }
    </script>
</body>
</html>
