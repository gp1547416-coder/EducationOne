<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EducationOne | Games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .games-btn { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
        .phonk-btn { background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%); }
        .coding-btn { background: #1e293b; border: 1px solid #10b981; color: #10b981; }
        .android-btn { background: linear-gradient(135deg, #a4c639 0%, #3ddc84 100%); color: #064e3b; }
    </style>
</head>
<body class="min-h-screen p-6 flex flex-col items-center">

    <div class="max-w-md w-full p-8 rounded-[2.5rem] glass text-center mb-6">
        <header class="mb-8">
            <h1 class="text-4xl font-black tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">EducationOne</h1>
            <p id="userNameDisplay" class="mt-2 text-emerald-400 font-bold uppercase text-[10px] tracking-widest italic">Loading User...</p>
        </header>

        <div class="space-y-4 my-8">
            <a href="https://funedu-learning.vercel.app" class="block w-full py-4 rounded-2xl games-btn font-bold hover:scale-[1.02] transition-all">Lots of Games Unblocked</a>
            
            <a href="https://learningspot.vercel.app" class="block w-full py-4 rounded-2xl bg-white text-black font-bold hover:scale-[1.02] transition-all">Unblocked Roblox & Games</a>

            <a href="https://smartlesson.vercel.app" class="block w-full py-4 rounded-2xl android-btn font-black hover:scale-[1.02] transition-all shadow-lg shadow-emerald-500/20">
                🤖 Unblocked Android Emulator
            </a>
            
            <a href="https://networkclass.vercel.app" class="block w-full py-4 rounded-2xl phonk-btn font-bold hover:scale-[1.02] transition-all">Unblocked Phonk Playlist</a>
            
            <a href="https://fasteducation.vercel.app" class="block w-full py-4 rounded-2xl coding-btn font-mono font-bold hover:scale-[1.02] transition-all text-sm">&lt; Unblocked Coding /&gt;</a>
            
            <a href="https://classmathlearning.vercel.app" class="block w-full py-3 px-6 rounded-2xl glass text-slate-400 font-semibold text-xs transition-all hover:bg-white/5 italic">Unblocked Searcher (Coming Soon)</a>
        </div>

        <form action="https://formspree.io/f/xqeybwvp" method="POST" class="text-left space-y-3">
            <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Request a Website</label>
            <input type="hidden" name="Username" id="hiddenName">
            <input type="text" name="message" placeholder="Paste link or game name..." required 
                class="w-full bg-slate-950 border border-white/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-emerald-500 text-white">
            <button type="submit" class="w-full bg-emerald-500 text-black font-bold py-3 rounded-xl hover:bg-emerald-400 transition-all">Send to Greyson</button>
        </form>
    </div>

    <div id="inbox" class="max-w-md w-full p-6 rounded-3xl glass hidden">
        <h3 class="text-xs font-bold text-slate-500 uppercase mb-4 tracking-widest text-center">Your Inbox</h3>
        <div id="notif-list" class="space-y-3"></div>
    </div>

    <button onclick="logout()" class="mt-8 text-slate-600 text-[10px] uppercase font-bold tracking-widest hover:text-white transition-colors">Logout / Change Name</button>

    <script>
        const supabaseUrl = 'https://dkqxklxniugjpchpajlz.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrcXhrbHhuaXVnanBjaHBhamx6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNjY4MTIsImV4cCI6MjA4ODk0MjgxMn0.tBrAd0Im7XR30oNV1NROERm6-yF8PNBFeCqFFX4qbGM';
        const supabase = supabasejs.createClient(supabaseUrl, supabaseKey);

        const myName = localStorage.getItem('edOne_username');
        if (!myName) { window.location.href = "index.html"; }

        document.getElementById('userNameDisplay').innerText = "Logged in as: " + myName;
        document.getElementById('hiddenName').value = myName;

        async function fetchNotifs() {
            const { data } = await supabase.from('site_notifications').select('*').eq('user_id', myName).order('created_at', { ascending: false });
            if (data && data.length > 0) {
                document.getElementById('inbox').classList.remove('hidden');
                document.getElementById('notif-list').innerHTML = data.map(n => `
                    <div class="p-4 rounded-xl bg-emerald-500/10 border border-emerald-500/20">
                        <p class="text-[10px] text-emerald-400 font-bold uppercase mb-1">Reply from Greyson</p>
                        <p class="text-sm text-slate-200">${n.message}</p>
                    </div>
                `).join('');
            }
        }

        function logout() {
            localStorage.removeItem('edOne_username');
            window.location.href = "index.html";
        }

        fetchNotifs();
        setInterval(fetchNotifs, 30000);
    </script>
</body>
</html>
