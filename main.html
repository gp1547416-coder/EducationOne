<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EducationOne | Games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #020617; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .games-btn { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
        .phonk-btn { background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%); }
    </style>
</head>
<body class="min-h-screen p-6 flex flex-col items-center">

    <div class="max-w-md w-full p-8 rounded-[2.5rem] glass text-center mb-6">
        <h1 class="text-4xl font-black tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">EducationOne</h1>
        <p id="userNameDisplay" class="mt-2 text-emerald-400 font-bold uppercase text-[10px] tracking-widest">User: ...</p>

        <div class="space-y-4 my-8">
            <a href="https://funedu-learning.vercel.app" class="block w-full py-4 rounded-2xl games-btn font-bold">Lots of Games Unblocked</a>
            <a href="https://learningspot.vercel.app" class="block w-full py-4 rounded-2xl bg-white text-black font-bold">Unblocked Roblox & Games</a>
            <a href="https://networkclass.vercel.app" class="block w-full py-4 rounded-2xl phonk-btn font-bold">Unblocked Phonk Playlist</a>
        </div>

        <form action="https://formspree.io/f/xqeybwvp" method="POST" class="text-left space-y-3">
            <label class="text-[10px] font-bold text-slate-500 uppercase">Request a Website</label>
            <input type="hidden" name="Username" id="hiddenName">
            <input type="text" name="message" placeholder="Paste link or name here..." required 
                class="w-full bg-slate-950 border border-white/10 rounded-xl px-4 py-3 text-sm outline-none">
            <button type="submit" class="w-full bg-emerald-500 text-black font-bold py-3 rounded-xl">Send to Greyson</button>
        </form>
    </div>

    <div id="inbox" class="max-w-md w-full p-6 rounded-3xl glass hidden">
        <h3 class="text-xs font-bold text-slate-500 uppercase mb-4 tracking-widest">Your Notifications</h3>
        <div id="notif-list" class="space-y-3"></div>
    </div>

    <button onclick="logout()" class="mt-8 text-slate-600 text-[10px] uppercase font-bold tracking-widest">Logout / Change Name</button>

    <script>
        const supabaseUrl = 'https://dkqxklxniugjpchpajlz.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrcXhrbHhuaXVnanBjaHBhamx6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNjY4MTIsImV4cCI6MjA4ODk0MjgxMn0.tBrAd0Im7XR30oNV1NROERm6-yF8PNBFeCqFFX4qbGM';
        const supabase = supabasejs.createClient(supabaseUrl, supabaseKey);

        const myName = localStorage.getItem('edOne_username');
        
        // Security check: If they sneaked onto this page without a name, kick them out
        if (!myName) { window.location.href = "index.html"; }

        document.getElementById('userNameDisplay').innerText = "User: " + myName;
        document.getElementById('hiddenName').value = myName;

        async function fetchNotifs() {
            const { data } = await supabase.from('site_notifications').select('*').eq('user_id', myName).order('created_at', { ascending: false });
            if (data && data.length > 0) {
                document.getElementById('inbox').classList.remove('hidden');
                document.getElementById('notif-list').innerHTML = data.map(n => `
                    <div class="p-4 rounded-xl bg-emerald-500/10 border border-emerald-500/20">
                        <p class="text-[10px] text-emerald-400 font-bold uppercase mb-1">Reply from Greyson</p>
                        <p class="text-sm">${n.message}</p>
                    </div>
                `).join('');
            }
        }

        function logout() {
            localStorage.removeItem('edOne_username');
            window.location.href = "index.html";
        }

        fetchNotifs();
    </script>
</body>
</html>
