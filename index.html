<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EducationOne | Welcome</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div id="loginBox" class="max-w-sm w-full p-8 rounded-[2.5rem] glass text-center shadow-2xl">
        <h1 class="text-4xl font-black mb-2 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">EducationOne</h1>
        <p class="text-slate-400 text-sm mb-8 font-medium italic">Greyson's Portal</p>
        
        <input type="text" id="userIn" placeholder="Enter a Username..." 
            class="w-full bg-black border border-white/10 rounded-2xl px-4 py-4 mb-4 outline-none focus:border-blue-500 text-center font-bold">
        
        <button onclick="enterSite()" class="w-full bg-white text-black font-black py-4 rounded-2xl hover:scale-[1.02] transition-all">
            Enter Site
        </button>
    </div>

    <script>
        // If they already have a name, skip this page immediately
        if (localStorage.getItem('edOne_username')) {
            window.location.href = "main.html";
        }

        function enterSite() {
            const name = document.getElementById('userIn').value.trim();
            if (name.length < 2) return alert("Choose a name!");
            
            localStorage.setItem('edOne_username', name);
            window.location.href = "main.html";
        }
    </script>
</body>
</html>
