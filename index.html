<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EducationOne</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .phonk-btn { background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%); }
        .games-btn { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
        button:disabled { opacity: 0.6; cursor: not-allowed; background-color: #334155 !important; color: #94a3b8 !important; }
        
        /* Smooth fade for the setup overlay */
        #userSetup { transition: opacity 0.5s ease-in-out; }
    </style>
</head>
<body class="min-h-screen p-6 flex flex-col items-center">

    <div id="userSetup" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/90 backdrop-blur-md hidden p-6">
        <div class="max-w-sm w-full p-8 rounded-[2rem] glass text-center">
            <h2 class="text-3xl font-extrabold mb-2 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">Welcome!</h2>
            <p class="text-slate-400 text-sm mb-6">Choose a username for EducationOne</p>
            <input type="text" id="usernameInput" placeholder="Enter Nickname..." 
                class="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-3 text-white mb-4 outline-none focus:border-blue-500">
            <button onclick="saveUser()" class="w-full bg-white text-black font-bold py-3 rounded-xl hover:scale-105 transition-transform">
                Start Exploring
            </button>
        </div>
    </div>

    <div class="max-w-md w-full p-8 rounded-[2.5rem] glass shadow-2xl text-center mb-8">
        <header class="mb-8">
            <h1 class="text-5xl font-extrabold tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-blue-400 via-emerald-400 to-indigo-400">EducationOne</h1>
            <p id="welcomeUser" class="mt-4 text-emerald-400 font-bold tracking-wide uppercase text-xs">Loading Profile...</p>
        </header>

        <div class="space-y-4 mb-10">
            <a href="https://funedu-learning.vercel.app" class="block w-full py-4 rounded-2xl games-btn font-bold text-lg transition-all hover:scale-[1.03] active:scale-95 shadow-lg shadow-blue-500/20">Lots of Games Unblocked</a>
            <a href="https://learningspot.vercel.app" class="block w-full py-4 rounded-2xl bg-white text-black font-bold text-lg transition-all hover:scale-[1.03] active:scale-95">Unblocked Roblox & Games</a>
            <a href="https://networkclass.vercel.app" class="block w-full py-4 rounded-2xl phonk-btn font-bold text-lg transition-all hover:scale-[1.03] active:scale-95 shadow-purple-500/20">Unblocked Phonk Playlist</a>
            <a href="https://fasteducation.vercel.app" class="block w-full py-4 rounded-2xl bg-slate-800 text-emerald-400 font-mono text-lg border border-slate-700 transition-all hover:scale-[1.03]">&lt; Unblocked Coding /&gt;</a>
            <a href="https://classmathlearning.vercel.app" class="block w-full py-3 px-6 rounded-2xl glass text-slate-400 font-semibold text-sm transition-all hover:bg-white/10 italic">[IN-DEV] Unblocked Searcher</a>
        </div>

        <hr class="border-white/5 mb-8">

        <div class="text-left">
            <h3 class="text-xs font-bold uppercase tracking-widest text-slate-500 mb-4 text-center">Request a Website</h3>
            <form action="https://formspree.io/f/xqeybwvp" method="POST" id="siteForm" class="space-y-3">
                <div class="bg-slate-900 rounded-xl px-4 py-2 border border-white/5">
                    <label class="text-[10px] text-slate-500 font-bold uppercase">Sending as</label>
                    <input type="text" name="Username" id="idDisplay" readonly 
                        class="w-full bg-transparent text-emerald-400 font-mono text-sm outline-none cursor-default">
                </div>
                
                <input type="text" name="message" placeholder="What website should I add?" required 
                    class="w-full bg-slate-950 border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 text-white">
                
                <button type="submit" id="submitBtn" disabled 
                    class="w-full bg-emerald-500 text-slate-950 font-bold py-3 rounded-xl transition-all">
                    Setting up user...
                </button>
            </form>
        </div>
    </div>

    <div id="inboxContainer" class="max-w-md w-full p-6 rounded-3xl glass shadow-xl hidden">
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-xs font-bold uppercase tracking-widest text-slate-500">Notifications</h3>
            <span id="notifCount" class="bg-blue-500 text-[10px] font-bold px-2 py-1 rounded-full">0 NEW</span>
        </div>
        <div id="notification-list" class="space-y-3 text-left"></div>
    </div>

    <script>
        const supabaseUrl = 'https://dkqxklxniugjpchpajlz.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrcXhrbHhuaXVnanBjaHBhamx6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNjY4MTIsImV4cCI6MjA4ODk0MjgxMn0.tBrAd0Im7XR30oNV1NROERm6-yF8PNBFeCqFFX4qbGM';
        const supabase = supabasejs.createClient(supabaseUrl, supabaseKey);

        const setupOverlay = document.getElementById('userSetup');
        const welcomeText = document.getElementById('welcomeUser');
        const idDisplay = document.getElementById('idDisplay');
        const submitBtn = document.getElementById('submitBtn');

        // Check for existing user
        function initUser() {
            const savedName = localStorage.getItem('edOne_username');
            
            if (!savedName) {
                // Show setup if no name found
                setupOverlay.classList.remove('hidden');
            } else {
                // Apply existing name
                welcomeText.innerText = "Logged in as: " + savedName;
                idDisplay.value = savedName;
                submitBtn.disabled = false;
                submitBtn.innerText = "Submit Request";
                checkNotifications(savedName);
            }
        }

        function saveUser() {
            const input = document.getElementById('usernameInput').value.trim();
            if (input.length < 2) return alert("Username too short!");
            
            localStorage.setItem('edOne_username', input);
            setupOverlay.style.opacity = '0';
            setTimeout(() => {
                setupOverlay.classList.add('hidden');
                initUser();
            }, 500);
        }

        async function checkNotifications(user) {
            const { data } = await supabase.from('site_notifications').select('*').eq('user_id', user).order('created_at', { ascending: false });
            if (data && data.length > 0) {
                document.getElementById('inboxContainer').classList.remove('hidden');
                document.getElementById('notifCount').innerText = `${data.length} NEW`;
                document.getElementById('notification-list').innerHTML = data.map(item => `
                    <div class="p-4 rounded-xl bg-emerald-500/10 border border-emerald-500/20">
                        <p class="text-[10px] text-emerald-400 font-extrabold uppercase mb-1 tracking-widest">Reply from Greyson</p>
                        <p class="text-sm text-slate-200">${item.message}</p>
                    </div>
                `).join('');
            }
        }

        initUser();
        setInterval(() => {
            const current = localStorage.getItem('edOne_username');
            if(current) checkNotifications(current);
        }, 20000);
    </script>
</body>
</html>
