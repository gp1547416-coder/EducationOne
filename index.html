<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EducationOne</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'Fira Code', monospace; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); }
        .phonk-btn { background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%); }
        .code-btn { background: #1e293b; border: 1px solid #334155; }
        .unblocked-glow { box-shadow: 0 0 15px rgba(52, 211, 153, 0.2); }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full p-8 rounded-[2.5rem] border border-white/10 bg-slate-900/40 shadow-2xl text-center">
        <header class="mb-10">
            <h1 class="text-5xl font-extrabold tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-blue-400 via-emerald-400 to-indigo-400">
                EducationOne
            </h1>
            <p class="mt-4 text-slate-400 font-medium tracking-wide">Greyson’s Websites</p>
        </header>

        <div class="space-y-4">
            
            <a href="https://learningspot.vercel.app" 
               class="block w-full py-4 px-6 rounded-2xl bg-white text-black font-bold text-lg transition-all hover:scale-[1.03] active:scale-95 shadow-lg">
                [TAKES LONG TO LOAD] Unblocked Roblox & Games
            </a>

            <a href="https://networkclass.vercel.app" 
               class="block w-full py-4 px-6 rounded-2xl phonk-btn text-white font-bold text-lg transition-all hover:scale-[1.03] active:scale-95 shadow-lg shadow-purple-500/20">
                Unblocked Phonk Playlist
            </a>

            <a href="https://fasteducation.vercel.app" 
               class="block w-full py-4 px-6 rounded-2xl code-btn text-emerald-400 mono font-medium text-lg transition-all hover:scale-[1.03] hover:border-emerald-500/50 active:scale-95 shadow-lg">
                &lt; Unblocked Coding /&gt;
            </a>

            <a href="https://classmathlearning.vercel.app" 
               class="block w-full py-4 px-6 rounded-2xl glass border border-white/10 text-white font-semibold text-lg transition-all hover:bg-white/10 active:scale-95">
                <span class="text-[10px] uppercase tracking-[0.2em] text-emerald-400 block mb-1">[IN-DEV]</span>
                Unblocked Searcher
            </a>

        </div>

        <footer class="mt-12">
            <div class="h-px w-12 bg-slate-800 mx-auto mb-4"></div>
            <p class="text-slate-600 text-[10px] uppercase tracking-[0.3em] font-bold">
                &copy; 2026 EducationOne Portal
            </p>
        </footer>
    </div>

</body>
</html>
