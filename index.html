<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EducationOne</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen p-6 flex flex-col items-center">
    <div class="max-w-md w-full p-8 rounded-[2.5rem] glass shadow-2xl text-center mb-8">
        <h1 class="text-5xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">EducationOne</h1>
        <p class="mt-4 text-slate-400 italic">Greyson’s Websites</p>
        
        <div class="space-y-4 my-8">
            <a href="https://FunEdu.vercel.app" class="block w-full py-4 rounded-xl bg-blue-600 font-bold">Lots of Games Unblocked</a>
            <a href="https://learningspot.vercel.app" class="block w-full py-4 rounded-xl bg-white text-black font-bold">Unblocked Roblox & Games</a>
            <a href="https://networkclass.vercel.app" class="block w-full py-4 rounded-xl bg-purple-600 font-bold">Unblocked Phonk Playlist</a>
        </div>

        <form action="https://formspree.io/f/gp1547416@gmail.com" method="POST" class="text-left space-y-3">
            <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest">Request a Website</h3>
            <input type="text" name="message" id="requestInput" placeholder="Loading ID..." required 
                class="w-full bg-black border border-white/10 rounded-xl px-4 py-3 text-sm focus:border-blue-500 outline-none">
            <button type="submit" class="w-full bg-emerald-500 text-black font-bold py-3 rounded-xl">Submit Request</button>
        </form>
    </div>

    <div id="inboxContainer" class="max-w-md w-full p-6 rounded-3xl glass hidden">
        <h3 class="text-xs font-bold text-slate-500 uppercase mb-4">Inbox</h3>
        <div id="notification-list" class="space-y-3"></div>
    </div>

    <script>
        const supabaseUrl = 'https://dkqxklxniugjpchpajlz.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrcXhrbHhuaXVnanBjaHBhamx6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNjY4MTIsImV4cCI6MjA4ODk0MjgxMn0.tBrAd0Im7XR30oNV1NROERm6-yF8PNBFeCqFFX4qbGM';
        const supabase = supabasejs.createClient(supabaseUrl, supabaseKey);

        let myId = localStorage.getItem('edOne_userId') || 'User-' + Math.floor(Math.random() * 9000 + 1000);
        localStorage.setItem('edOne_userId', myId);
        document.getElementById('requestInput').placeholder = `(ID: ${myId}) Request a site...`;

        async function checkNotifications() {
            const { data } = await supabase.from('site_notifications').select('*').eq('user_id', myId).order('created_at', { ascending: false });
            if (data && data.length > 0) {
                document.getElementById('inboxContainer').classList.remove('hidden');
                document.getElementById('notification-list').innerHTML = data.map(item => `
                    <div class="p-4 rounded-xl bg-white/5 border border-white/10">
                        <p class="text-xs text-emerald-400 font-bold">REPLY FROM GREYSON</p>
                        <p class="text-sm mt-1">${item.message}</p>
                    </div>
                `).join('');
            }
        }
        checkNotifications();
        setInterval(checkNotifications, 15000); // Check for new replies every 15 seconds
    </script>
</body>
</html>
